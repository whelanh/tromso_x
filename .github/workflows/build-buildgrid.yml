name: Build Tromso (BuildGrid)

# Builds oci/tromso.bst on the home BuildGrid cluster via Tailscale,
# then exports and pushes the OCI image to ghcr.io/hanthor/tromso.

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push OCI image to GHCR'
        type: boolean
        default: true
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'elements/**'
      - 'project.conf'
      - 'include/**'

env:
  IMAGE_NAME: tromso
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  BST_TARGET: oci/tromso.bst
  BST2_IMAGE: registry.gitlab.com/freedesktop-sdk/infrastructure/freedesktop-sdk-docker-images/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d
  BUILDGRID_ENDPOINT: grpc://buildgrid.manatee-basking.ts.net:50051

concurrency:
  group: buildgrid-tromso-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Use a self-hosted runner if ACTIONS_RUNNER_LABEL repo variable is set
    # (e.g. "self-hosted"), otherwise fall back to GitHub-hosted ubuntu-24.04.
    # GitHub-hosted runners are hard-capped at 6 h; self-hosted have no cap.
    runs-on: ${{ vars.ACTIONS_RUNNER_LABEL || 'ubuntu-24.04' }}
    timeout-minutes: 720   # 12 h — effective on self-hosted; GH-hosted capped at 6 h
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Just
        run: |
          JUST_VERSION=$(curl -s https://api.github.com/repos/casey/just/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin just
          just --version

      - name: Free disk space
        if: runner.environment == 'github-hosted'
        uses: ublue-os/remove-unwanted-software@v9
        continue-on-error: true

      # ── Join Tailscale (GitHub-hosted runners only) ──────────────────
      # Self-hosted runners (e.g. bihar) are already on the Tailscale network
      # and can reach BuildGrid directly — no need to join again.
      - name: Connect to Tailscale
        if: runner.environment == 'github-hosted'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Verify BuildGrid reachable
        run: |
          echo "Waiting for BuildGrid to be reachable…"
          for i in $(seq 1 12); do
            if nc -zv buildgrid.manatee-basking.ts.net 50051 2>/dev/null; then
              echo "✓ BuildGrid reachable"
              exit 0
            fi
            echo "Attempt ${i}/12 — not yet reachable, waiting 5s…"
            sleep 5
          done
          echo "✗ BuildGrid unreachable after 60s" >&2
          tailscale status 2>/dev/null || true
          exit 1

      # ── BST setup ────────────────────────────────────────────────────
      - name: Pull bst2 image
        run: podman pull "$BST2_IMAGE"

      - name: Cache BST sources
        uses: actions/cache@v4
        with:
          path: ~/.cache/buildstream/sources
          key: bst-sources-tromso-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: bst-sources-tromso-

      # ── Write BuildGrid remote execution config ──────────────────────
      - name: Write BuildGrid config
        run: |
          mkdir -p ~/.config/buildstream
          cat > ~/.config/buildstream/buildgrid.conf << EOF
          scheduler:
            on-error: continue
            fetchers: 24
            network-retries: 3
          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80
          build:
            retry-failed: true
          cache:
            cache-buildtrees: never
          remote-execution:
            execution-service:
              url: ${BUILDGRID_ENDPOINT}
              instance-name: ""
            storage-service:
              url: ${BUILDGRID_ENDPOINT}
              instance-name: ""
            action-cache-service:
              url: ${BUILDGRID_ENDPOINT}
              instance-name: ""
          EOF

      # ── Build ────────────────────────────────────────────────────────
      - name: Build ${{ env.BST_TARGET }}
        run: |
          BST_FLAGS="--no-interactive --config /root/.config/buildstream/buildgrid.conf" \
          just bst build "$BST_TARGET"

      # ── Export + push ─────────────────────────────────────────────────
      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Export OCI image
        env:
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_REVISION: ${{ github.sha }}
          OCI_IMAGE_VERSION: ${{ github.ref_name }}
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
          BST_FLAGS: --no-interactive
        run: just export

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' && inputs.push_image != false }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push to GHCR
        if: ${{ github.event_name != 'pull_request' && inputs.push_image != false }}
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          for tag in latest "$DATE_TAG" "${{ github.sha }}"; do
            sudo podman tag "${IMAGE_NAME}:latest" "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}"
            for attempt in 1 2 3; do
              sudo podman push "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}" && break
              echo "Push attempt ${attempt} failed, retrying…"; sleep 5
            done
          done
          echo "Pushed ${IMAGE_REGISTRY}/${IMAGE_NAME}:{latest,${DATE_TAG},${{ github.sha }}}"

      # ── Verify published image ────────────────────────────────────────
      - name: Verify published image
        if: ${{ inputs.push_image }}
        run: |
          sudo podman pull "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest"
          echo "Image manifest:"
          sudo podman inspect "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest" \
            --format '{{.RepoDigests}} labels={{.Labels}}' | head -5
          echo "✅ Image verified at ${IMAGE_REGISTRY}/${IMAGE_NAME}:latest"

      # ── Summary ──────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: \`${BST_TARGET}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **BuildGrid**: \`${BUILDGRID_ENDPOINT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE_REGISTRY}/${IMAGE_NAME}:latest\`" >> $GITHUB_STEP_SUMMARY
